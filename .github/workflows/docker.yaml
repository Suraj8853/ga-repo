name: pipeline for building the docker image
on:
  push: 
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: docker buildx setup
        uses: docker/setup-buildx-action@v4
      - name: docker login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: build and push the docker image.
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
                ghcr.io/suraj8853/ga-repo:latest
                ghcr.io/suraj8853/ga-repo:${{github.sha}}
          cache-from: type=gha
          cache-to: type=gha,mode=max