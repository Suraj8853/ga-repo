name: python-node
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  MY_SECRET: ${{secrets.MY_SECRET}}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11   
      - run: python --version
      - name: use repository secret
        run: echo "$MY_SECRET"