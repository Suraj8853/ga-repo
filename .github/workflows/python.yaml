name: python-node
on:
  push:
    branches: [main]
    paths: ['python.yml', '.github/workflows/python.yml']
  pull_request:
    branches: [main]
  
env:
  MY_SECRET: ${{secrets.MY_SECRET}}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11   
      - run: python --version
      - name: use repository secret
        run: echo "$MY_SECRET"
  build:
    runs-on: ubuntu-latest
    steps:
      - run: |
             mkdir output
             echo "built" > output/result.txt
      - uses: actions/upload-artifact@v4
        with:
          name: build-result
          path: output/
          retention-days: 3
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: 
          name: build-result
      - run: cat result.txt   