name: caller
on:
  push:
    branches: [main]
    paths: ['.github/workflows/caller.yaml']
jobs:
  deploy-to-dev:
    uses: ./.github/workflows/reuseable-deploy.yaml
    with:
      environment: dev
    secrets: inherit

  deploy-to-prod:
    uses: ./.github/workflows/reuseable-deploy.yaml
    needs: deploy-to-dev
    with:
      environment: production
    secrets: inherit