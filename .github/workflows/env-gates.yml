name: pipeline for different environment

on:
  push:
    branches: [main]
    paths: [".github/workflows/env-gates.yml"]
jobs:
  deploy-to-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - run: echo "Running in dev"
  deploy-to-staging:
    runs-on: ubuntu-latest
    needs: deploy-to-dev
    environment: staging
    steps:
      - run: echo "Running in Staging..."
  deploy-to-prod:
    runs-on: ubuntu-latest
    needs: deploy-to-staging
    environment: production
    steps:
      - run: echo "Running in prod...."
