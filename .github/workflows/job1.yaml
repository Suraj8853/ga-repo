name: parallel jobs
on:
  push: 
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    strategy:
      matrix:
        os: ['ubuntu-latest,windows-latest']
    runs-on: ${{matrix.os}}
    steps:
        - run: echo "Linting...."
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Testing...."
  build:
    runs-on: ubuntu-latest
    needs: [lint,test]
    steps:
      - run: echo "Build tests...."
  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - run: echo "Deploying...."